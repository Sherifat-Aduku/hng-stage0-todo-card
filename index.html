<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sherifat's Todo Card</title>
    <link rel="stylesheet" href="todo-card.css" />
  </head>
  <body>
    <div class="app-container">
      <article
        class="todo-card"
        id="todo-card"
        data-testid="test-todo-card"
        aria-label="Todo task card">

        <!-- Header -->
        <div class="todo-card__header">
          <h2 class="todo-card__title" data-testid="test-todo-title">
            Sherifat's Todo Card
          </h2>

      <span
        class="todo-card__priority-indicator todo-card__priority-indicator--high"
        data-testid="test-todo-priority-indicator"
        aria-hidden="true">
      </span>

          <span
            class="todo-card__priority todo-card__priority--high"
            data-testid="test-todo-priority"
            aria-label="Priority: High">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="#ef4444" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            High
          </span>
        </div>

        <!-- Description -->
       <div data-testid="test-todo-collapsible-section" id="collapsible-section">
  <p class="todo-card__description" data-testid="test-todo-description" id="todo-description">
    Implement a fully accessible, testable, responsive Todo Card component
    with correct semantics and ARIA attributes for the HNG Stage 0 task.
  </p>
</div>

     <button
       class="todo-card__expand-toggle"
       data-testid="test-todo-expand-toggle"
       id="expand-toggle"
       aria-expanded="false"
       aria-controls="collapsible-section">
       Show more
       </button>

        <!-- Dates -->
        <div class="todo-card__dates">
          <time
            class="todo-card__due-date"
            data-testid="test-todo-due-date"
            datetime="2026-04-16T18:00:00.000Z">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Due Apr 16, 2026
          </time>

          <!-- Overdue Indicator -->
         <span
          class="todo-card__overdue-indicator"
          data-testid="test-todo-overdue-indicator"
          id="overdue-indicator"
          aria-live="polite"
          style="display:none;">
          ⚠ Overdue
          </span>
          
          <span
            class="todo-card__time-remaining"
            data-testid="test-todo-time-remaining"
            id="time-remaining"
            aria-live="polite">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span id="time-remaining-text">Calculating...</span>
          </span>
        </div>

        <!-- Status -->
        <div class="todo-card__status-row">
  <span
    class="todo-card__status todo-card__status--pending"
    data-testid="test-todo-status"
    id="todo-status"
    aria-label="Status: Pending">
    Pending
  </span>

  <label for="status-control" class="sr-only">Change status</label>
  <select
    class="todo-card__status-control"
    data-testid="test-todo-status-control"
    id="status-control"
    aria-label="Task status">
    <option value="Pending">Pending</option>
    <option value="In Progress">In Progress</option>
    <option value="Done">Done</option>
  </select>
</div>

        <!-- Tags -->
        <ul
          role="list"
          class="todo-card__tags"
          data-testid="test-todo-tags"
          aria-label="Tags"
        >
          <li class="todo-card__tag" data-testid="test-todo-tag-work" role="listitem">Work</li>
          <li class="todo-card__tag" data-testid="test-todo-tag-urgent" role="listitem">Urgent</li>
          <li class="todo-card__tag" data-testid="test-todo-tag-design" role="listitem">Design</li>
        </ul>

        <!-- Footer -->
        <div class="todo-card__footer">
          <label class="todo-card__checkbox-label">
            <input
              type="checkbox"
              class="todo-card__checkbox"
              data-testid="test-todo-complete-toggle"
              aria-label="Mark task as complete"
              id="complete-toggle"
            />
            <span class="todo-card__checkbox-text" id="checkbox-text">Mark complete</span>
          </label>

          <div class="todo-card__actions">
            <button
              class="todo-card__btn todo-card__btn--edit"
              data-testid="test-todo-edit-button"
              aria-label="Edit task"
              title="Edit task"
              id="edit-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Edit
            </button>

            <button
              class="todo-card__btn todo-card__btn--delete"
              data-testid="test-todo-delete-button"
              aria-label="Delete task"
              title="Delete task"
              id="delete-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              Delete
            </button>
          </div>
        </div>
        <!-- Edit Form (hidden by default) -->
<div
  class="todo-card__edit-form"
  data-testid="test-todo-edit-form"
  id="edit-form"
  style="display:none;">

  <div class="todo-card__edit-field">
    <label for="edit-title-input">Title</label>
    <input
      type="text"
      id="edit-title-input"
      data-testid="test-todo-edit-title-input"
      class="todo-card__edit-input"
      placeholder="Task title" />
  </div>

  <div class="todo-card__edit-field">
    <label for="edit-description-input">Description</label>
    <textarea
      id="edit-description-input"
      data-testid="test-todo-edit-description-input"
      class="todo-card__edit-textarea"
      rows="3"
      placeholder="Task description"></textarea>
  </div>

  <div class="todo-card__edit-field">
    <label for="edit-priority-select">Priority</label>
    <select
      id="edit-priority-select"
      data-testid="test-todo-edit-priority-select"
      class="todo-card__edit-select">
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High" selected>High</option>
    </select>
  </div>

  <div class="todo-card__edit-field">
    <label for="edit-due-date-input">Due Date</label>
    <input
      type="datetime-local"
      id="edit-due-date-input"
      data-testid="test-todo-edit-due-date-input"
      class="todo-card__edit-input" />
  </div>

  <div class="todo-card__edit-actions">
    <button
      class="todo-card__btn todo-card__btn--save"
      data-testid="test-todo-save-button"
      id="save-btn">
      Save
    </button>
    <button
      class="todo-card__btn todo-card__btn--cancel"
      data-testid="test-todo-cancel-button"
      id="cancel-btn">
      Cancel
    </button>
  </div>
</div>
      </article>
    </div>

    <script src="todo-card.js"></script>
  </body>
</html>
